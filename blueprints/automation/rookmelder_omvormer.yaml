blueprint:
  name: Rookmelder – Omvormer uitschakelen (sirene, bevestiging & logboek)
  description: "Stuurt notificatie bij rook en schakelt omvormer uit na bevestiging of timeout. Werkt met switch en select."
  domain: automation

  input:
    smoke_sensor:
      name: Rookmelder
      selector:
        entity:
          domain: binary_sensor
          device_class: smoke

    inverter_entity:
      name: Omvormer (switch of select)
      selector:
        entity:
          domain:
            - switch
            - select

    notify_service:
      name: Notificatie service
      selector:
        entity:
          domain: notify

    timeout_minutes:
      name: Wachtijd (minuten)
      default: 2
      selector:
        number:
          min: 1
          max: 10
          unit_of_measurement: minuten
          mode: slider

    shutdown_option:
      name: Select waarde (bijv OFF)
      default: "OFF"
      selector:
        text:

    siren_entity:
      name: Sirene (optioneel)
      default: ""
      selector:
        entity:
          domain:
            - siren
            - switch

    send_confirmation:
      name: Bevestigingsnotificatie sturen
      default: true
      selector:
        boolean:

    enable_logbook:
      name: Logboek inschakelen
      default: true
      selector:
        boolean:

mode: single

trigger:
  - platform: state
    entity_id: !input smoke_sensor
    to: "on"

action:
  - variables:
      inverter: !input inverter_entity
      shutdown_value: !input shutdown_option
      siren: !input siren_entity
      log_enabled: !input enable_logbook
      confirm_enabled: !input send_confirmation
      timeout_mins: !input timeout_minutes

  # Log rookdetectie
  - if:
      - condition: template
        value_template: "{{ log_enabled }}"
    then:
      - service: logbook.log
        data:
          name: Rookmelder
          message: "Rook gedetecteerd – automatisering gestart"
          entity_id: !input smoke_sensor

  # Sirene (optioneel)
  - if:
      - condition: template
        value_template: "{{ siren != '' }}"
    then:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states[siren].domain == 'siren' }}"
            sequence:
              - service: siren.turn_on
                target:
                  entity_id: "{{ siren }}"
          - conditions:
              - condition: template
                value_template: "{{ states[siren].domain == 'switch' }}"
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: "{{ siren }}"

  # Notificatie
  - service: notify.mobile_app_{{ device_id(notify_device) }}
    data:
      title: "🚨 Rook gedetecteerd!"
      message: >
        Bevestig om de omvormer uit te schakelen.
        Geen reactie binnen {{ timeout_mins }} minuten = automatisch uitschakelen.
      data:
        actions:
          - action: CONFIRM_SHUTDOWN
            title: "🔌 Omvormer uitschakelen"
          - action: IGNORE
            title: "❌ Loos alarm"

  # Wachten op reactie
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: CONFIRM_SHUTDOWN
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: IGNORE
    timeout:
      minutes: !input timeout_minutes
    continue_on_timeout: true

  # Beslissing
  - choose:

      # Loos alarm
      - conditions:
          - condition: template
            value_template: >
              {{ wait.trigger is not none and
                 wait.trigger.event.data.action == 'IGNORE' }}
        sequence:
          - if:
              - condition: template
                value_template: "{{ log_enabled }}"
            then:
              - service: logbook.log
                data:
                  name: Rookmelder
                  message: "Actie genegeerd (loos alarm)"
                  entity_id: !input smoke_sensor

      # Shutdown
      - conditions:
          - condition: template
            value_template: >
              {{ wait.trigger is none or
                 wait.trigger.event.data.action == 'CONFIRM_SHUTDOWN' }}
        sequence:

          # Switch / Select detectie
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states[inverter].domain == 'switch' }}"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: "{{ inverter }}"

              - conditions:
                  - condition: template
                    value_template: "{{ states[inverter].domain == 'select' }}"
                sequence:
                  - service: select.select_option
                    target:
                      entity_id: "{{ inverter }}"
                    data:
                      option: "{{ shutdown_value }}"

          # Logboek
          - if:
              - condition: template
                value_template: "{{ log_enabled }}"
            then:
              - service: logbook.log
                data:
                  name: Omvormer
                  message: >
                    {% if wait.trigger is none %}
                    Geen reactie – automatisch uitgeschakeld
                    {% else %}
                    Bevestigd – omvormer uitgeschakeld
                    {% endif %}
                  entity_id: "{{ inverter }}"

          # Bevestiging
          - if:
              - condition: template
                value_template: "{{ confirm_enabled }}"
            then:
              - service: notify.mobile_app_{{ device_id(notify_device) }}
                data:
                  title: "✅ Omvormer uitgeschakeld"
                  message: "De omvormer is veilig uitgeschakeld."