blueprint:
  name: Rookmelder – Omvormer uitschakelen (met testmodus)
  description: >
    Stuurt notificatie bij rookdetectie.
    Schakelt omvormer uit na bevestiging of timeout,
    of voert een veilige test uit zonder uitschakeling.
  domain: automation

  input:
    smoke_sensor:
      name: Rookmelder
      selector:
        entity:
          domain: binary_sensor
          device_class: smoke

    inverter_entity:
      name: Omvormer (switch of select)
      selector:
        entity:
          domain:
            - switch
            - select

    shutdown_option:
      name: Select-waarde bij uitschakelen (alleen bij select)
      default: "OFF"
      selector:
        text:

    notify_device:
      name: Telefoon (Home Assistant app)
      selector:
        device:
          integration: mobile_app

    timeout_minutes:
      name: Timeout (minuten)
      default: 2
      selector:
        number:
          min: 1
          max: 10
          unit_of_measurement: minuten
          mode: slider

    siren_entity:
      name: Sirene (optioneel)
      default: null
      selector:
        entity:
          domain:
            - siren
            - switch

    test_mode:
      name: Testmodus (geen uitschakeling!)
      default: false
      selector:
        boolean:

    enable_logbook:
      name: Logboek inschakelen
      default: true
      selector:
        boolean:

mode: single

trigger:
  - platform: state
    entity_id: !input smoke_sensor
    to: "on"

action:
  - variables:
      inverter: !input inverter_entity
      siren: !input siren_entity
      shutdown_value: !input shutdown_option
      timeout_mins: !input timeout_minutes
      test_mode: !input test_mode
      log_enabled: !input enable_logbook

  # Log rookdetectie
  - if:
      - condition: template
        value_template: "{{ log_enabled }}"
    then:
      - service: logbook.log
        data:
          name: Rookmelder
          message: >
            Rook gedetecteerd – automatisering gestart
            {% if test_mode %}(TESTMODUS){% endif %}
          entity_id: !input smoke_sensor

  # Sirene (optioneel)
  - if:
      - condition: template
        value_template: "{{ siren is not none }}"
    then:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ siren.startswith('siren.') }}"
            sequence:
              - service: siren.turn_on
                target:
                  entity_id: "{{ siren }}"
          - conditions:
              - condition: template
                value_template: "{{ siren.startswith('switch.') }}"
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: "{{ siren }}"

  # Notificatie
  - service: notify.mobile_app_{{ device_id(!input notify_device) }}
    data:
      title: "🚨 Rook gedetecteerd!"
      message: >
        {% if test_mode %}
        TESTMODUS actief – omvormer wordt NIET uitgeschakeld.
        {% else %}
        Bevestig om de omvormer uit te schakelen.
        {% endif %}
        Geen reactie binnen {{ timeout_mins }} minuten.
      data:
        tag: rookmelder_omvormer
        actions:
          - action: CONFIRM
            title: "✅ Bevestigen"
          - action: IGNORE
            title: "❌ Annuleren"

  # Wachten op actie
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: CONFIRM
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: IGNORE
    timeout:
      minutes: !input timeout_minutes
    continue_on_timeout: true

  # Beslissing
  - choose:

      # Genegeerd
      - conditions:
          - condition: template
            value_template: >
              {{ wait.trigger is not none and
                 wait.trigger.event.data.action == 'IGNORE' }}
        sequence:
          - service: logbook.log
            data:
              name: Rookmelder
              message: "Actie geannuleerd door gebruiker"
              entity_id: !input smoke_sensor

      # Bevestigd of timeout
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger is none or wait.trigger.event.data.action == 'CONFIRM' }}"
        sequence:

          # Alleen uitschakelen als geen testmodus
          - if:
              - condition: template
                value_template: "{{ not test_mode }}"
            then:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ inverter.startswith('switch.') }}"
                    sequence:
                      - service: switch.turn_off
                        target:
                          entity_id: "{{ inverter }}"

                  - conditions:
                      - condition: template
                        value_template: "{{ inverter.startswith('select.') }}"
                    sequence:
                      - service: select.select_option
                        target:
                          entity_id: "{{ inverter }}"
                        data:
                          option: "{{ shutdown_value }}"

          # Logboek
          - if:
              - condition: template
                value_template: "{{ log_enabled }}"
            then:
              - service: logbook.log
                data:
                  name: Omvormer
                  message: >
                    {% if test_mode %}
                    TESTMODUS – geen uitschakeling uitgevoerd
                    {% elif wait.trigger is none %}
                    Automatisch uitgeschakeld (timeout)
                    {% else %}
                    Uitgeschakeld na bevestiging
                    {% endif %}
                  entity_id: "{{ inverter }}"

          # Sirene uit
          - if:
              - condition: template
                value_template: "{{ siren is not none }}"
            then:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ siren.startswith('siren.') }}"
                    sequence:
                      - service: siren.turn_off
                        target:
                          entity_id: "{{ siren }}"
                  - conditions:
                      - condition: template
                        value_template: "{{ siren.startswith('switch.') }}"
                    sequence:
                      - service: switch.turn_off
                        target:
                          entity_id: "{{ siren }}"